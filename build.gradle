plugins {
    id 'java'
    id 'application'
}

group = 'com.simondmc'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

mainClassName = 'com.simondmc.Main'

test {
    useJUnitPlatform()
}